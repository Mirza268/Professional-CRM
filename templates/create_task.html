<!DOCTYPE html>
<html>
<head><title>CRM - New Task</title></head>
<body style="font-family:Arial; padding:40px;">
    <div style="background:white; padding:30px; max-width:500px; margin:0 auto; border:1px solid #ddd; border-radius:8px;">
        <h2>Schedule Operational Task Target Requirement</h2>
        <form method="POST">
            Task Objective Title: <input type="text" name="title" style="width:100%; padding:8px; margin-bottom:10px;" required><br>
            Context Description Details:<br><textarea name="description" rows="3" style="width:100%; padding:8px; margin-bottom:10px;"></textarea><br>
            Target Execution Deadline Date: <input type="date" name="due_date" style="width:100%; padding:8px; margin-bottom:10px;" required><br>
            Priority Tier Level: <select name="priority" style="width:100%; padding:8px; margin-bottom:15px;"><option value="Low">Low Priority Tier</option><option value="Medium" selected>Medium Priority Tier</option><option value="High">High Priority Critical 🔥</option></select>
            <button type="submit" style="background:#e67e22; color:white; border:none; padding:10px; width:100%;">Commit Task Entry to Board</button>
        </form>
    </div>
</body>
</html>

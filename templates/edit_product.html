<!DOCTYPE html>
<html>
<head><title>CRM - Edit Asset</title></head>
<body style="font-family:Arial; padding:40px;">
    <h2>✏️ Alter Asset Financial Parameters: {{ item[1] }}</h2>
    <form method="POST" style="max-width:400px;">
        Updated Product Name: <input type="text" name="name" value="{{ item[1] }}" style="width:100%; padding:8px; margin-bottom:10px;" required><br>
        Altered Standard Sale Price ($): <input type="number" step="0.01" name="price" value="{{ item[3] }}" style="width:100%; padding:8px; margin-bottom:15px;" required><br>
        <button type="submit" style="padding:10px 20px; background:#1abc9c; color:white; border:none;">Apply Changes</button>
    </form>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
<title>CRM - Edit Product</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8525653404694793"
crossorigin="anonymous"></script>

</head>
<body>
<div id="bg3d" aria-hidden="true"></div>

    <div class="card">
        <h2>✏️ Edit Product</h2>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <label>SKU</label>
            <div class="sku-display">{{ item['sku'] }}</div>
            <label>Product Name <span class="required">*</span></label>
            <input type="text" name="name" value="{{ item['name'] }}" required>
            <label>Price ($) <span class="required">*</span></label>
            <input type="number" step="0.01" name="price" value="{{ '%.2f' | format(item['price'] / 100) }}" required>
            <button type="submit">Update Product</button>
        </form>
        <a href="/inventory" class="back">← Back to Inventory</a>
    </div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="{{ url_for('static', filename='js/bg3d.js') }}"></script>
</body>
</html>

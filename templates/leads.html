<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>CRM - Leads</title><style>body{font-family:Arial; background:#f4f6f9; padding:30px;}table{width:100%; border-collapse:collapse; background:white;}th,td{padding:12px; text-align:left; border-bottom:1px solid #ddd;}th{background:#3498db; color:white;}</style></head>
<body>
    <h2>👥 Central Leads Management System</h2>
    <a href="/leads/add" style="padding:10px 15px; background:#2ecc71; color:white; text-decoration:none; border-radius:4px;">+ Provision New Lead</a><br><br>
    <table>
        <tr><th>ID</th><th>Client Identification Name</th><th>State Status Badge</th><th>Actions</th></tr>
        {% for lead in leads %}
        <tr>
            <td>#LD-{{ lead[0] }}</td>
            <td><strong>{{ lead[1] }}</strong></td>
            <td><span style="background:#eee; padding:4px 8px; border-radius:4px;">{{ lead[4] }}</span></td>
            <td>
                <a href="/leads/view/{{ lead[0] }}">Profile</a> | 
                <a href="/leads/edit/{{ lead[0] }}">Modify</a> | 
                <a href="/leads/status/{{ lead[0] }}">Shift Phase</a> | 
                <a href="/leads/delete/{{ lead[0] }}" style="color:red;">Purge</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
<title>CRM - Invoice #{{ inv['id'] }}</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8525653404694793"
crossorigin="anonymous"></script>

</head>
<body>
<div id="bg3d" aria-hidden="true"></div>

    <div class="container">
        <div class="card">
            <h2>🧾 INVOICE</h2>
            <div class="field">
                <div class="label">Invoice ID</div>
                <div class="value">#INV-{{ inv['id'] }}</div>
            </div>
            <div class="field">
                <div class="label">Client</div>
                <div class="value">{{ inv['client_name'] }}</div>
            </div>
            <div class="field">
                <div class="label">Amount</div>
                <div class="amount">${{ "%.2f" | format(inv['amount'] / 100) }} USD</div>
            </div>
            <div class="field">
                <div class="label">Status</div>
                <div class="status status-{{ inv['status'].lower() }}">{{ inv['status'] }}</div>
            </div>
            {% if inv['paid_at'] %}
            <div class="field">
                <div class="label">Paid On</div>
                <div class="value">{{ inv['paid_at'] }}</div>
            </div>
            {% endif %}
        </div>
        <a href="/invoices" class="back">← Back to Invoices</a>
    </div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="{{ url_for('static', filename='js/bg3d.js') }}"></script>
</body>
</html>

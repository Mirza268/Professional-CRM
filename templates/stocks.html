<!DOCTYPE html>
<html>
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
<title>CRM - Stock Adjustment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8525653404694793"
crossorigin="anonymous"></script>

</head>
<body>
<div id="bg3d" aria-hidden="true"></div>

    <div class="card">
        <h2>🔄 Adjust Stock</h2>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <label>Product <span class="required">*</span></label>
            <select name="product_id" required>
                {% for item in items %}
                <option value="{{ item['id'] }}">{{ item['name'] }} (Stock: {{ item['stock'] }})</option>
                {% endfor %}
            </select>
            <label>Quantity <span class="required">*</span></label>
            <input type="number" name="qty" placeholder="e.g. 50 or -10" required>
            <p class="hint">Use positive to add stock, negative to remove.</p>
            <button type="submit">Update Stock</button>
        </form>
        <a href="/inventory" class="back">← Back to Inventory</a>
    </div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="{{ url_for('static', filename='js/bg3d.js') }}"></script>
</body>
</html>

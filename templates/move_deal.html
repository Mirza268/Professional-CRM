<!DOCTYPE html>
<html>
<head><title>CRM - Progress Stage</title></head>
<body style="font-family:Arial; padding:40px;">
    <h2>🔄 Shift Pipeline Milestone Phase Node</h2>
    <form method="POST" style="max-width:300px;">
        <select name="stage" style="width:100%; padding:8px; margin-bottom:15px;">
            <option value="Prospect" {% if deal[3]=='Prospect' %}selected{% endif %}>Prospect Analysis</option>
            <option value="Proposal" {% if deal[3]=='Proposal' %}selected{% endif %}>Proposal Issued</option>
            <option value="Negotiation" {% if deal[3]=='Negotiation' %}selected{% endif %}>Negotiation Framework</option>
            <option value="Closed Won" {% if deal[3]=='Closed Won' %}selected{% endif %}>Closed Won (Success) 🎉</option>
            <option value="Closed Lost" {% if deal[3]=='Closed Lost' %}selected{% endif %}>Closed Lost (Failure)</option>
        </select>
        <button type="submit" style="padding:10px; background:#9b59b6; color:white; width:100%; border:none;">Commit Progress Milestone</button>
    </form>
</body>
</html>

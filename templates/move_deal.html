<!DOCTYPE html>
<html>
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
<title>CRM - Move Deal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8525653404694793"
crossorigin="anonymous"></script>

</head>
<body>
<div id="bg3d" aria-hidden="true"></div>

    <div class="card">
        <h2>🔄 Move Deal Stage</h2>
        <div class="current">Deal: <strong>{{ deal['title'] }}</strong><br>Current: {{ deal['stage'] }}</div>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <label>Select New Stage:</label>
            <select name="stage">
                <option value="Prospect" {% if deal['stage']=='Prospect' %}selected{% endif %}>Prospect</option>
                <option value="Proposal" {% if deal['stage']=='Proposal' %}selected{% endif %}>Proposal</option>
                <option value="Negotiation" {% if deal['stage']=='Negotiation' %}selected{% endif %}>Negotiation</option>
                <option value="Closed Won" {% if deal['stage']=='Closed Won' %}selected{% endif %}>Closed Won 🎉</option>
                <option value="Closed Lost" {% if deal['stage']=='Closed Lost' %}selected{% endif %}>Closed Lost</option>
            </select>
            <button type="submit">Update Stage</button>
        </form>
        <a href="/pipeline" class="back">← Back to Pipeline</a>
    </div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="{{ url_for('static', filename='js/bg3d.js') }}"></script>
</body>
</html>

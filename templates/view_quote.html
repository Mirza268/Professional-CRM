<!DOCTYPE html>
<html>
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
<title>CRM - Quote #{{ quote['id'] }}</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8525653404694793"
crossorigin="anonymous"></script>

</head>
<body>
<div id="bg3d" aria-hidden="true"></div>

    <div class="container">
        <div class="card">
            <h2>📄 OFFICIAL QUOTE</h2>
            <div class="field">
                <div class="label">Quote Reference</div>
                <div class="value">#QUOT-{{ quote['id'] }}</div>
            </div>
            <div class="field">
                <div class="label">Client</div>
                <div class="value">{{ quote['client_name'] }}</div>
            </div>
            <div class="field">
                <div class="label">Proposed Amount</div>
                <div class="amount">${{ "%.2f" | format(quote['amount'] / 100) }} USD</div>
            </div>
            <div class="field">
                <div class="label">Valid Until</div>
                <div class="value expiry">{{ quote['valid_until'] }}</div>
            </div>
            <div class="footer">Generated via CRM Enterprise System</div>
        </div>
        <a href="/quotes" class="back">← Back to Quotes</a>
    </div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="{{ url_for('static', filename='js/bg3d.js') }}"></script>
</body>
</html>

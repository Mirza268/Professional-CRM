<!DOCTYPE html>
<html>
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
<title>CRM - Payment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div id="bg3d" aria-hidden="true"></div>

    <div class="card">
        <h2>💳 Payment Gateway</h2>
        <p>Process payment for invoice:</p>
        <div class="invoice-id">#INV-{{ id }}</div>
        <p style="font-size:13px;color:#888;">This is a simulated payment. No actual transaction will occur.</p>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <button type="submit">Confirm Payment</button>
        </form>
        <a href="/invoices" class="back">← Cancel</a>
    </div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="{{ url_for('static', filename='js/bg3d.js') }}"></script>
</body>
</html>

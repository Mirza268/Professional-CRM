<!DOCTYPE html>
<html>
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
<title>CRM - Update Task Status</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div id="bg3d" aria-hidden="true"></div>

    <div class="card">
        <h2>🔄 Update Task Status</h2>
        <div class="current">Task: <strong>{{ task['title'] }}</strong><br>Current: {{ task['status'] }}</div>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <label>Select New Status:</label>
            <select name="status">
                <option value="Pending" {% if task['status']=='Pending' %}selected{% endif %}>Pending</option>
                <option value="In Progress" {% if task['status']=='In Progress' %}selected{% endif %}>In Progress</option>
                <option value="Completed" {% if task['status']=='Completed' %}selected{% endif %}>Completed</option>
            </select>
            <button type="submit">Update Status</button>
        </form>
        <a href="/tasks" class="back">← Back to Tasks</a>
    </div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="{{ url_for('static', filename='js/bg3d.js') }}"></script>
</body>
</html>

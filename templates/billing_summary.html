<!DOCTYPE html>
<html>
<head><title>CRM - Finance Summary</title><style>body{font-family:Arial; background:#f4f6f9; padding:30px;}.grid{display:grid; grid-template-columns:repeat(2, 1fr); gap:20px; max-width:800px; margin:0 auto;}.card{background:white; padding:25px; border-radius:8px; text-align:center;}.amount{font-size:28px; font-weight:bold; margin-top:10px;}</style></head>
<body>
    <h2 style="text-align:center; margin-bottom:30px;">📊 Executive Financial Liquidity Metric Dashboard</h2>
    <div class="grid">
        <div class="card" style="border-top:5px solid green;">
            <h3>Total Realized Liquid Cash Capital Revenue Collected</h3>
            <div class="amount" style="color:green;">${{ total_paid }}</div>
        </div>
        <div class="card" style="border-top:5px solid orange;">
            <h3>Total Outstanding Accounts Receivable Debt Book Asset</h3>
            <div class="amount" style="color:orange;">${{ total_unpaid }}</div>
        </div>
    </div>
</body>
</html>

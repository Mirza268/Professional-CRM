<!DOCTYPE html>
<html>
<head><title>CRM - Tasks Archive</title></head>
<body style="font-family:Arial; padding:30px;">
    <h2>📁 Archived / Completed Performance Tasks Backup Drive</h2><hr>
    <table border="1" cellpadding="10" style="width:100%; border-collapse:collapse;">
        <tr style="background:#eee;"><th>ID Code</th><th>Task Objective Title</th><th>Priority Level</th><th>Archived State</th></tr>
        {% for task in tasks if task[5] == 'Completed' %}
        <tr><td>#TSK-{{ task[0] }}</td><td>{{ task[1] }}</td><td>{{ task[4] }}</td><td><strong style="color:green;">Archived Success</strong></td></tr>
        {% endfor %}
    </table>
    <br><a href="/tasks">Back to Active Tasks Board</a>
</body>
</html>

<!DOCTYPE html>
<html>
<head><title>CRM - Shift Lead State</title></head>
<body style="font-family:Arial; padding:40px;">
    <h2>⚙️ Transition Execution Lifecycle Phase</h2>
    <form method="POST" style="max-width:300px;">
        <label>Select Pipeline Phase State:</label>
        <select name="status" style="width:100%; padding:8px; margin-bottom:15px;">
            <option value="New" {% if lead[4]=='New' %}selected{% endif %}>New / Cold Target</option>
            <option value="Contacted" {% if lead[4]=='Contacted' %}selected{% endif %}>Active Contact Established</option>
            <option value="Qualified" {% if lead[4]=='Qualified' %}selected{% endif %}>Qualified Structural Deal</option>
            <option value="Lost" {% if lead[4]=='Lost' %}selected{% endif %}>Discarded / Lost Segment</option>
        </select>
        <button type="submit" style="padding:10px; background:#2980b9; color:white; width:100%; border:none;">Commit Lifecycle Shift</button>
    </form>
</body>
</html>

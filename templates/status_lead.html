<!DOCTYPE html>
<html>
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
<title>CRM - Update Lead Status</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div id="bg3d" aria-hidden="true"></div>

    <div class="card">
        <h2>⚙️ Update Lead Status</h2>
        <div class="current">Current: <strong>{{ lead['status'] }}</strong></div>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <label>Select New Status:</label>
            <select name="status">
                <option value="New" {% if lead['status']=='New' %}selected{% endif %}>New</option>
                <option value="Contacted" {% if lead['status']=='Contacted' %}selected{% endif %}>Contacted</option>
                <option value="Qualified" {% if lead['status']=='Qualified' %}selected{% endif %}>Qualified</option>
                <option value="Lost" {% if lead['status']=='Lost' %}selected{% endif %}>Lost</option>
            </select>
            <button type="submit">Update Status</button>
        </form>
        <a href="/leads" class="back">← Back to Leads</a>
    </div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="{{ url_for('static', filename='js/bg3d.js') }}"></script>
</body>
</html>

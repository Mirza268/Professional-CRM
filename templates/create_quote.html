<!DOCTYPE html>
<html>
<head><title>CRM - Mint Quote</title></head>
<body style="font-family:Arial; padding:40px;">
    <h2>✍️ Draft Commercial Financial Quotation Proposition</h2>
    <form method="POST" style="max-width:400px;">
        Client / Organization Account Name: <input type="text" name="client" style="width:100%; padding:8px; margin-bottom:10px;" required><br>
        Proposed Contract Project Valuation ($): <input type="number" step="0.01" name="amount" style="width:100%; padding:8px; margin-bottom:10px;" required><br>
        Terms Guarantee Validity Date: <input type="date" name="validity" style="width:100%; padding:8px; margin-bottom:15px;" required><br>
        <button type="submit" style="padding:10px 20px; background:#2c3e50; color:white; border:none;">Generate Proposal</button>
    </form>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
<title>CRM - Create Quote</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8525653404694793"
crossorigin="anonymous"></script>

</head>
<body>
<div id="bg3d" aria-hidden="true"></div>

    <div class="card">
        <h2>✍️ Create Quote</h2>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <label>Client Name <span class="required">*</span></label>
            <input type="text" name="client" placeholder="e.g. Acme Corporation" required>
            <label>Amount ($) <span class="required">*</span></label>
            <input type="number" step="0.01" name="amount" placeholder="0.00" required>
            <label>Valid Until <span class="required">*</span></label>
            <input type="date" name="validity" required>
            <button type="submit">Generate Quote</button>
        </form>
        <a href="/quotes" class="back">← Back to Quotes</a>
    </div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="{{ url_for('static', filename='js/bg3d.js') }}"></script>
</body>
</html>

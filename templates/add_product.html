<!DOCTYPE html>
<html>
<head><title>CRM - New Asset</title></head>
<body style="font-family:Arial; padding:40px;">
    <h2>➕ Append New Product Entry Item to Database Catalog</h2>
    <form method="POST" style="max-width:400px;">
        Product Name / Label: <input type="text" name="name" style="width:100%; padding:8px; margin-bottom:10px;" required><br>
        Stock Keeping Unit (SKU Unique Token Code): <input type="text" name="sku" style="width:100%; padding:8px; margin-bottom:10px;" required><br>
        Standard Unit Sale Price ($): <input type="number" step="0.01" name="price" style="width:100%; padding:8px; margin-bottom:15px;" required><br>
        <button type="submit" style="padding:10px 20px; background:#1abc9c; color:white; border:none;">Commit Asset Specification Record</button>
    </form>
</body>
</html>

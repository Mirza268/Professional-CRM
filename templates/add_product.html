<!DOCTYPE html>
<html>
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
<title>CRM - Add Product</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div id="bg3d" aria-hidden="true"></div>

    <div class="card">
        <h2>➕ Add Product</h2>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <label>Product Name <span class="required">*</span></label>
            <input type="text" name="name" placeholder="e.g. Wireless Mouse" required>
            <label>SKU <span class="required">*</span></label>
            <input type="text" name="sku" placeholder="e.g. WM-2024-001" required>
            <label>Price ($) <span class="required">*</span></label>
            <input type="number" step="0.01" name="price" placeholder="0.00" required>
            <button type="submit">Add Product</button>
        </form>
        <a href="/inventory" class="back">← Back to Inventory</a>
    </div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="{{ url_for('static', filename='js/bg3d.js') }}"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head><title>CRM Portal - Register</title></head>
<body style="font-family:Arial; padding:50px; background:#f4f6f9;">
    <div style="background:white; padding:30px; max-width:400px; margin:0 auto; border-radius:8px;">
        <h2>System Onboarding Provisioning</h2>
        <form method="POST">
            Username: <input type="text" name="username" style="width:100%; padding:8px; margin-bottom:10px;" required><br>
            Email: <input type="email" name="email" style="width:100%; padding:8px; margin-bottom:10px;" required><br>
            Password: <input type="password" name="password" style="width:100%; padding:8px; margin-bottom:10px;" required><br>
            Role: <select name="role" style="width:100%; padding:8px; margin-bottom:15px;"><option value="Agent">Sales Agent</option><option value="Admin">System Administrator</option></select>
            <button type="submit" style="padding:10px; background:green; color:white; border:none; width:100%;">Register Employee</button>
        </form>
    </div>
</body>
</html>

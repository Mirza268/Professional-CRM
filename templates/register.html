<!DOCTYPE html>
<html>
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
<title>CRM Portal - Register</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div id="bg3d" aria-hidden="true"></div>

    <div class="card">
        <h2>📝 Create Account</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="flash flash-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST">
            <label>Username</label>
            <input type="text" name="username" placeholder="John Doe" required minlength="2">
            <label>Email</label>
            <input type="email" name="email" placeholder="john@company.com" required>
            <label>Password</label>
            <input type="password" name="password" placeholder="Min. 6 characters" required minlength="6">
            <label>Role</label>
            <select name="role">
                <option value="Employee">Employee</option>
                <option value="Manager">Manager</option>
                <option value="Admin">Administrator</option>
            </select>
            <button type="submit">Create Account</button>
        </form>
        <p class="login-link">Already have an account? <a href="/login">Sign In</a></p>
    </div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="{{ url_for('static', filename='js/bg3d.js') }}"></script>
</body>
</html>
